<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarm 현황</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="logo">🚨 Alarm 현황</div>
  <div class="sub" data-i="al_sub">알람 발생 내역을 확인하세요</div>

  <div class="cards">
    <div class="card c1">
      <div class="icon">⚠️</div>
      <div class="title">최근 알람</div>
      <div class="desc">마지막 24시간 발생 알람</div>
    </div>
    <div class="card c2">
      <div class="icon">📊</div>
      <div class="title">알람 통계</div>
      <div class="desc">알람 유형별 발생 빈도</div>
    </div>
    <div class="card c3">
      <div class="icon">⏱️</div>
      <div class="title">실시간 모니터링</div>
      <div class="desc">현재 진행 중인 알람 상태</div>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
