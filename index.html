<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>테스트 페이지</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f4ff;
      font-family: sans-serif;
    }
    .box {
      text-align: center;
      background: white;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 { color: #3b5bdb; font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🎉 배포 성공!</h1>
    <p>GitHub Pages가 정상적으로 작동하고 있어요.</p>
  </div>
</body>
</html>
